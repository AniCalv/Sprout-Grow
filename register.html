<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprout & Grow</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Sprout & Grow logo" class="logo">

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="events.html">Events</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Event Registration</h1>

<form>
  
  <!-- TEXT BOXES -->
  <label for="name">Name:</label><br>
  <input type="text" id="name"><br><br>

  <label for="email">Email:</label><br>
  <input type="text" id="email"><br><br>

  <label for="phone">Phone:</label><br>
  <input type="text" id="phone"><br><br>

  <!-- TEXT AREA -->
  <label for="message">Tell us what you're interested in:</label><br>
  <textarea id="message"></textarea><br><br>

  <!-- CHECKBOXES -->
  <p>Select events you’re interested in:</p>
  <input type="checkbox"> Kids Events<br>
  <input type="checkbox"> Classes<br>
  <input type="checkbox"> Lectures<br><br>

  <!-- RADIO BUTTONS -->
  <p>Experience Level:</p>
  <input type="radio" name="level"> Beginner<br>
  <input type="radio" name="level"> Experienced<br><br>

  <!-- DROPDOWN -->
  <label for="day">Preferred Day:</label><br>
  <select id="day">
    <option>Weekday</option>
    <option>Weekend</option>
  </select><br><br>

  <!-- SUBMIT -->
  <input type="submit" value="Register">

</form>

<br>

<a href="index.html">Back to Home</a>
    </main>

    <footer>
        <a href="https://www.instagram.com/" target="_blank">
            <img src="images/instagram.png" alt="Instagram" width="30">

        </a>

    </footer>
</body>
